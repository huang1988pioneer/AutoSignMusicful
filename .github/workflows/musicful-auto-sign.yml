name: Musicful Auto Sign

on:
  workflow_dispatch:
  schedule:
    - cron: "6,21,36,51 * * * *"

jobs:
  signin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Musicful sign in
        env:
          MUSICFUL_SECRETS_JSON: ${{ toJson(secrets) }}
          MUSICFUL_MAX_ACCOUNTS: "115"
          MUSICFUL_SCHEDULE_MODE: "rolling"
          MUSICFUL_SCHEDULE_START_UTC: "2026-05-31T05:06:00Z"
          MUSICFUL_SCHEDULE_INTERVAL_MINUTES: "15"
          MUSICFUL_SIGNIN_URL: ${{ vars.MUSICFUL_SIGNIN_URL || 'https://www.musicful.ai/growth-center/' }}
        run: npm run signin
