name: Musicful Auto Sign

on:
  workflow_dispatch:
    inputs:
      account_index:
        description: "Musicful account index to sign in, or all"
        required: false
        default: "all"
  schedule:
    # Taiwan time: daily 05:06 and 17:06.
    - cron: "6 21 * * *"
    - cron: "6 9 * * *"

permissions:
  contents: read

jobs:
  signin:
    name: Sign in ${{ matrix.account_label }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHOULD_RUN_ACCOUNT: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.account_index == 'all' || github.event.inputs.account_index == format('{0}', matrix.account_index))) }}
      MUSICFUL_STORAGE_STATE_BASE64: ${{ secrets[format('MUSICFUL_STORAGE_STATE_BASE64_{0}', matrix.account_index)] }}
      MUSICFUL_ACCOUNT_SECRET_NAME: ${{ format('MUSICFUL_STORAGE_STATE_BASE64_{0}', matrix.account_index) }}
      MUSICFUL_ACCOUNT_INDEX: ${{ matrix.account_index }}
      MUSICFUL_MAX_ACCOUNTS: "33"
      MUSICFUL_SCHEDULE_MODE: "all"
      MUSICFUL_SCHEDULE_START_UTC: "2026-05-30T21:06:00Z"
      MUSICFUL_SCHEDULE_INTERVAL_MINUTES: "6"
      MUSICFUL_SIGNIN_URL: ${{ vars.MUSICFUL_SIGNIN_URL || 'https://tw.musicful.ai/growth-center/' }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - account_index: 1
            account_label: goldshoot0720
          - account_index: 2
            account_label: abuhg17
          - account_index: 3
            account_label: fengtuprinfo
          - account_index: 4
            account_label: feng33feng35feng3
          - account_index: 5
            account_label: chbondg2
          - account_index: 6
            account_label: huang1988pioneer
          - account_index: 7
            account_label: chbondg_outloook
          - account_index: 8
            account_label: gaokaolevel3iptopscorer_outlook
          - account_index: 9
            account_label: huang1988pioneer_outloook
          - account_index: 10
            account_label: fengtuta_tuta
          - account_index: 11
            account_label: fengfence_fence
          - account_index: 12
            account_label: samafengtu
          - account_index: 13
            account_label: fengtusama
          - account_index: 14
            account_label: fengwithting0831
          - account_index: 15
            account_label: fengwithfeng1127
          - account_index: 16
            account_label: fengwithtu1127
          - account_index: 17
            account_label: akaonda333
          - account_index: 18
            account_label: fbussinesseng
          - account_index: 19
            account_label: engdictatorf
          - account_index: 20
            account_label: flottojackpoteng
          - account_index: 21
            account_label: account_21
          - account_index: 22
            account_label: account_22
          - account_index: 23
            account_label: account_23
          - account_index: 24
            account_label: account_24
          - account_index: 25
            account_label: account_25
          - account_index: 26
            account_label: account_26
          - account_index: 27
            account_label: account_27
          - account_index: 28
            account_label: account_28
          - account_index: 29
            account_label: account_29
          - account_index: 30
            account_label: account_30
          - account_index: 31
            account_label: account_31
          - account_index: 32
            account_label: account_32
          - account_index: 33
            account_label: account_33
    steps:
      - name: Skip unselected account
        if: env.SHOULD_RUN_ACCOUNT != 'true'
        run: echo "Skipping ${{ matrix.account_label }}"

      - name: Skip missing storage state
        if: env.SHOULD_RUN_ACCOUNT == 'true' && env.MUSICFUL_STORAGE_STATE_BASE64 == ''
        run: echo "Skipping ${{ matrix.account_label }} because ${{ env.MUSICFUL_ACCOUNT_SECRET_NAME }} is not configured."

      - name: Checkout
        if: env.SHOULD_RUN_ACCOUNT == 'true' && env.MUSICFUL_STORAGE_STATE_BASE64 != ''
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.SHOULD_RUN_ACCOUNT == 'true' && env.MUSICFUL_STORAGE_STATE_BASE64 != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_ACCOUNT == 'true' && env.MUSICFUL_STORAGE_STATE_BASE64 != ''
        run: npm ci

      - name: Install browser
        if: env.SHOULD_RUN_ACCOUNT == 'true' && env.MUSICFUL_STORAGE_STATE_BASE64 != ''
        run: npx playwright install --with-deps chromium

      - name: Musicful sign in
        if: env.SHOULD_RUN_ACCOUNT == 'true' && env.MUSICFUL_STORAGE_STATE_BASE64 != ''
        run: npm run signin
