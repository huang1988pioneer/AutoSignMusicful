name: Musicful Auto Sign

on:
  workflow_dispatch:
    inputs:
      account_index:
        description: "Musicful account index to sign in, or all"
        required: false
        default: "all"
  schedule:
    # Taiwan time: daily 05:06.
    - cron: "6 21 * * *"

permissions:
  contents: read

jobs:
  signin:
    name: Sign in ${{ matrix.account_label }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SHOULD_RUN_ACCOUNT: ${{ github.event_name == 'schedule' || github.event.inputs.account_index == 'all' || github.event.inputs.account_index == format('{0}', matrix.account_index) }}
    strategy:
      fail-fast: false
      max-parallel: 11
      matrix:
        include:
          - account_index: 1
            account_label: goldshoot0720
          - account_index: 2
            account_label: abuhg17
          - account_index: 3
            account_label: fengtyprinfo
          - account_index: 4
            account_label: feng33feng35feng3
          - account_index: 5
            account_label: chbondg2
          - account_index: 6
            account_label: huang1988pioneer
          - account_index: 7
            account_label: chbondg_outloook
          - account_index: 8
            account_label: gaokaolevel3iptopscorer_outlook
          - account_index: 9
            account_label: huang1988pioneer_outloook
          - account_index: 10
            account_label: fengtuta_tuta
          - account_index: 11
            account_label: fengfence_fence
    steps:
      - name: Skip unselected account
        if: env.SHOULD_RUN_ACCOUNT != 'true'
        run: echo "Skipping ${{ matrix.account_label }}"

      - name: Checkout
        if: env.SHOULD_RUN_ACCOUNT == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.SHOULD_RUN_ACCOUNT == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: env.SHOULD_RUN_ACCOUNT == 'true'
        run: npm ci

      - name: Install browser
        if: env.SHOULD_RUN_ACCOUNT == 'true'
        run: npx playwright install --with-deps chromium

      - name: Musicful sign in
        if: env.SHOULD_RUN_ACCOUNT == 'true'
        env:
          MUSICFUL_STORAGE_STATE_BASE64: ${{ matrix.account_index == 1 && secrets.MUSICFUL_STORAGE_STATE_BASE64 || secrets[format('MUSICFUL_STORAGE_STATE_BASE64_{0}', matrix.account_index)] }}
          MUSICFUL_ACCOUNT_INDEX: ${{ matrix.account_index }}
          MUSICFUL_MAX_ACCOUNTS: "11"
          MUSICFUL_SCHEDULE_MODE: "all"
          MUSICFUL_SCHEDULE_START_UTC: "2026-05-30T21:06:00Z"
          MUSICFUL_SCHEDULE_INTERVAL_MINUTES: "6"
          MUSICFUL_SIGNIN_URL: ${{ vars.MUSICFUL_SIGNIN_URL || 'https://www.musicful.ai/growth-center/' }}
        run: npm run signin
