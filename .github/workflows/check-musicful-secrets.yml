name: Check Musicful Secrets

on:
  workflow_dispatch:
  schedule:
    # Taiwan time: daily 04:30.
    - cron: "30 20 * * *"

permissions:
  contents: read

jobs:
  check-duplicates:
    name: Check duplicate token or secret values
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      MUSICFUL_MAX_ACCOUNTS: "33"
      MUSICFUL_STORAGE_STATE_BASE64_1: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_1 }}
      MUSICFUL_STORAGE_STATE_BASE64_2: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_2 }}
      MUSICFUL_STORAGE_STATE_BASE64_3: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_3 }}
      MUSICFUL_STORAGE_STATE_BASE64_4: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_4 }}
      MUSICFUL_STORAGE_STATE_BASE64_5: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_5 }}
      MUSICFUL_STORAGE_STATE_BASE64_6: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_6 }}
      MUSICFUL_STORAGE_STATE_BASE64_7: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_7 }}
      MUSICFUL_STORAGE_STATE_BASE64_8: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_8 }}
      MUSICFUL_STORAGE_STATE_BASE64_9: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_9 }}
      MUSICFUL_STORAGE_STATE_BASE64_10: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_10 }}
      MUSICFUL_STORAGE_STATE_BASE64_11: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_11 }}
      MUSICFUL_STORAGE_STATE_BASE64_12: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_12 }}
      MUSICFUL_STORAGE_STATE_BASE64_13: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_13 }}
      MUSICFUL_STORAGE_STATE_BASE64_14: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_14 }}
      MUSICFUL_STORAGE_STATE_BASE64_15: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_15 }}
      MUSICFUL_STORAGE_STATE_BASE64_16: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_16 }}
      MUSICFUL_STORAGE_STATE_BASE64_17: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_17 }}
      MUSICFUL_STORAGE_STATE_BASE64_18: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_18 }}
      MUSICFUL_STORAGE_STATE_BASE64_19: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_19 }}
      MUSICFUL_STORAGE_STATE_BASE64_20: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_20 }}
      MUSICFUL_STORAGE_STATE_BASE64_21: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_21 }}
      MUSICFUL_STORAGE_STATE_BASE64_22: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_22 }}
      MUSICFUL_STORAGE_STATE_BASE64_23: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_23 }}
      MUSICFUL_STORAGE_STATE_BASE64_24: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_24 }}
      MUSICFUL_STORAGE_STATE_BASE64_25: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_25 }}
      MUSICFUL_STORAGE_STATE_BASE64_26: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_26 }}
      MUSICFUL_STORAGE_STATE_BASE64_27: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_27 }}
      MUSICFUL_STORAGE_STATE_BASE64_28: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_28 }}
      MUSICFUL_STORAGE_STATE_BASE64_29: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_29 }}
      MUSICFUL_STORAGE_STATE_BASE64_30: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_30 }}
      MUSICFUL_STORAGE_STATE_BASE64_31: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_31 }}
      MUSICFUL_STORAGE_STATE_BASE64_32: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_32 }}
      MUSICFUL_STORAGE_STATE_BASE64_33: ${{ secrets.MUSICFUL_STORAGE_STATE_BASE64_33 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check duplicate Musicful secrets
        run: npm run check:secrets
